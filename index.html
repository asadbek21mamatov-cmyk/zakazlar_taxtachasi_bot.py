<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do'kon</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --hint: var(--tg-theme-hint-color, #999999);
            --text: var(--tg-theme-text-color, #000000);
            --button: var(--tg-theme-button-color, #2481cc);
            --button-text: var(--tg-theme-button-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .item-card { background: var(--secondary-bg); padding: 10px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.2s; }
        .item-card:active { transform: scale(0.95); }
        .item-img { width: 100%; border-radius: 10px; height: 120px; object-fit: cover; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .item-title { font-weight: bold; margin: 8px 0 4px; font-size: 14px; height: 34px; overflow: hidden; }
        .item-price { color: var(--button); font-weight: bold; font-size: 15px; }
        .out-of-stock { filter: grayscale(100%); opacity: 0.6; pointer-events: none; }
        .sold-out-text { color: #ff4d4d; font-weight: bold; font-size: 14px; margin-top: 5px; }

        /* Loading */
        #loading { text-align: center; padding: 40px; font-size: 16px; color: var(--hint); }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--secondary-bg); border-top: 4px solid var(--button); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Detail view */
        #detail-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .detail-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; color: var(--button); cursor: pointer; font-weight: bold; }
        .detail-img { width: 100%; max-height: 300px; border-radius: 15px; background: var(--secondary-bg); display: block; object-fit: contain; }
        .section-title { font-weight: bold; margin: 15px 0 5px; color: var(--hint); text-transform: uppercase; font-size: 12px; }
        .controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-top: 30px; margin-bottom: 30px; }
        .btn-round { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--button); color: var(--button-text); font-size: 24px; cursor: pointer; }
        .btn-round:active { transform: translateY(2px); }
    </style>
</head>
<body>

<div id="loading">
    <div class="spinner"></div>
    Mahsulotlar yuklanmoqda...
</div>

<div id="main-view" style="display:none">
    <h2 id="user-greeting">Xush kelibsiz!</h2>
    <div class="grid" id="product-grid"></div>
</div>

<div id="detail-view">
    <div class="detail-header" onclick="closeDetail()">⬅️ Orqaga</div>
    <div id="detail-content"></div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    if (tg.initDataUnsafe.user) {
        document.getElementById('user-greeting').innerText = `Xush kelibsiz, ${tg.initDataUnsafe.user.first_name}!`;
    }

    let products = [];
    let cart = {};

    // GitHub'dan mahsulotlarni yuklash
    // cache=bust parametri — har doim yangi ma'lumot olish uchun
    async function loadProducts() {
        try {
            const res = await fetch(
               'https://raw.githubusercontent.com/asadbek21mamatov-cmyk/zakazlar_taxtachasi_bot.py/main/mahsulotlar.json=' + Date.now()
            );
            if (!res.ok) throw new Error('Yuklashda xato');
            products = await res.json();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            renderGrid();
        } catch (e) {
            document.getElementById('loading').innerHTML = '❌ Mahsulotlarni yuklab bo\'lmadi.<br>Qaytadan urinib ko\'ring.';
        }
    }

    function renderGrid() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => {
            const disabledClass = p.stock <= 0 ? 'out-of-stock' : '';
            const priceOrStatus = p.stock <= 0
                ? `<div class="sold-out-text">TUGAGAN</div>`
                : `<div class="item-price">${Number(p.price).toLocaleString()} so'm</div>`;
            return `
            <div class="item-card ${disabledClass}" onclick="openDetail(${p.id})">
                <img src="${p.image}" class="item-img" alt="${p.name}" onerror="this.style.background='#ddd';this.src=''">
                <div class="item-title">${p.name}</div>
                ${priceOrStatus}
            </div>`;
        }).join('');
    }

    function openDetail(id) {
        const p = products.find(x => x.id === id);
        const count = cart[id] ? cart[id].qty : 0;
        document.getElementById('detail-content').innerHTML = `
            <img src="${p.image}" class="detail-img" alt="${p.name}">
            <h1>${p.name}</h1>
            <div class="item-price" style="font-size: 20px;">${Number(p.price).toLocaleString()} so'm</div>
            <div class="section-title">Tarkibi va Tavsifi</div>
            <div>${p.desc}</div>
            <div class="section-title">Qo'llanilishi</div>
            <div>${p.usage}</div>
            <div class="controls">
                <button class="btn-round" onclick="updateQty(${p.id}, -1)">-</button>
                <span style="font-size: 24px; font-weight: bold;">${count}</span>
                <button class="btn-round" onclick="updateQty(${p.id}, 1)">+</button>
            </div>`;
        document.getElementById('main-view').style.display = 'none';
        document.getElementById('detail-view').style.display = 'block';
    }

    function closeDetail() {
        document.getElementById('detail-view').style.display = 'none';
        document.getElementById('main-view').style.display = 'block';
    }

    function updateQty(id, change) {
        const p = products.find(x => x.id === id);
        if (!cart[id]) cart[id] = { name: p.name, price: p.price, qty: 0 };
        let newQty = cart[id].qty + change;
        if (newQty < 0) newQty = 0;
        if (newQty > p.stock) {
            tg.showAlert(`Kechirasiz, omborda faqat ${p.stock} ta qolgan!`);
            newQty = p.stock;
        }
        cart[id].qty = newQty;
        if (cart[id].qty <= 0) delete cart[id];
        openDetail(id);
        updateMainButton();
    }

    function updateMainButton() {
        let total = 0;
        for (let id in cart) total += cart[id].qty * cart[id].price;
        if (total > 0) {
            tg.MainButton.setText(`Buyurtma berish (${total.toLocaleString()} so'm)`);
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    tg.MainButton.onClick(() => {
        tg.sendData(JSON.stringify(Object.values(cart)));
    });

    loadProducts();
</script>
</body>
</html>
